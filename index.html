<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>VERTIX UNIVERSITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              arabic: ['Cairo', 'sans-serif'],
            },
            colors: {
              primary: {
                50: '#eff6ff',
                100: '#dbeafe',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
                900: '#1e3a8a',
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        transition: direction 0.3s ease;
      }
      /* Apply Cairo font when RTL */
      [dir="rtl"] body,
      [dir="rtl"] * {
        font-family: 'Cairo', sans-serif;
      }
      /* RTL-specific adjustments */
      [dir="rtl"] .text-left {
        text-align: right;
      }
      [dir="rtl"] .text-right {
        text-align: left;
      }
      /* Flip margins and paddings for RTL */
      [dir="rtl"] .ml-auto { margin-left: 0; margin-right: auto; }
      [dir="rtl"] .mr-auto { margin-right: 0; margin-left: auto; }
      [dir="rtl"] .ml-2 { margin-left: 0; margin-right: 0.5rem; }
      [dir="rtl"] .mr-2 { margin-right: 0; margin-left: 0.5rem; }
      [dir="rtl"] .ml-3 { margin-left: 0; margin-right: 0.75rem; }
      [dir="rtl"] .mr-3 { margin-right: 0; margin-left: 0.75rem; }
      [dir="rtl"] .ml-4 { margin-left: 0; margin-right: 1rem; }
      [dir="rtl"] .mr-4 { margin-right: 0; margin-left: 1rem; }
      [dir="rtl"] .pl-2 { padding-left: 0; padding-right: 0.5rem; }
      [dir="rtl"] .pr-2 { padding-right: 0; padding-left: 0.5rem; }
      [dir="rtl"] .pl-3 { padding-left: 0; padding-right: 0.75rem; }
      [dir="rtl"] .pr-3 { padding-right: 0; padding-left: 0.75rem; }
      [dir="rtl"] .pl-4 { padding-left: 0; padding-right: 1rem; }
      [dir="rtl"] .pr-4 { padding-right: 0; padding-left: 1rem; }
      /* Flip borders for RTL */
      [dir="rtl"] .border-l { border-left: 0; border-right-width: 1px; }
      [dir="rtl"] .border-r { border-right: 0; border-left-width: 1px; }
      [dir="rtl"] .border-l-4 { border-left: 0; border-right-width: 4px; }
      [dir="rtl"] .border-r-4 { border-right: 0; border-left-width: 4px; }
      /* Flip rounded corners for RTL */
      [dir="rtl"] .rounded-l { border-radius: 0 0.25rem 0.25rem 0; }
      [dir="rtl"] .rounded-r { border-radius: 0.25rem 0 0 0.25rem; }
      [dir="rtl"] .rounded-l-lg { border-radius: 0 0.5rem 0.5rem 0; }
      [dir="rtl"] .rounded-r-lg { border-radius: 0.5rem 0 0 0.5rem; }
      /* Flip flex for RTL */
      [dir="rtl"] .space-x-2 > * + * { margin-left: 0; margin-right: 0.5rem; }
      [dir="rtl"] .space-x-3 > * + * { margin-left: 0; margin-right: 0.75rem; }
      [dir="rtl"] .space-x-4 > * + * { margin-left: 0; margin-right: 1rem; }
      /* Flip icons for RTL */
      [dir="rtl"] .rotate-rtl { transform: scaleX(-1); }
      /* Smooth transitions for RTL/LTR switch */
      * {
        transition-property: margin, padding, border, transform;
        transition-duration: 0.2s;
        transition-timing-function: ease-out;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      /* Animation for language switch */
      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-slide {
        animation: fadeSlide 0.2s ease-out;
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script>
      // Unregister any old service workers to prevent caching issues
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister().then(function() {
              console.log('[App] Service worker unregistered successfully');
            });
          }
        });
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
